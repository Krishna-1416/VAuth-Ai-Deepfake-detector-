services:
  - type: web
    name: ignition-hackverse-decodex-backend # Renamed for clarity and consistency
    runtime: python
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY # NEW: Essential for reliable Inference API
        sync: false
      - key: PORT
        value: 8000
    # REMOVED: Disk section. Persistent disk is NOT allowed on Render Free Tier 
    # and is no longer needed since we don't store 2GB of local models.
